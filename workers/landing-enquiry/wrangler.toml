name            = "neobookworm-landing-enquiry"
main            = "src/index.js"
compatibility_date  = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev     = true
preview_urls    = false

# ── D1 database binding ───────────────────────────────────────────────────────
# Run `npx wrangler d1 create neobookworm-enquiries` once, then paste the
# returned database_id below.
[[d1_databases]]
binding      = "DB"
database_name = "neobookworm-enquiries"
database_id  = "771b3047-f977-485e-9cfb-736815931998"

# ── Scheduled crons (Phase 3) ─────────────────────────────────────────────────
# All Cloudflare crons are UTC — there is no automatic DST adjustment.
#   */15 * * * *  — retry cron: pick up rows where notion_status or email_status is 'failed'
#   0 8  * * *   — daily digest: email Nick a table of all rows still failing after retries
#                  08:00 UTC = 08:00 GMT (winter) / 09:00 BST (summer)
[triggers]
crons = ["*/15 * * * *", "0 8 * * *"]

# ── Custom domain (future) ────────────────────────────────────────────────────
# Uncomment once neobookworm.uk DNS is managed by Cloudflare (zone present).
# Until then, the Worker is reached at the .workers.dev URL below.
#
# [[routes]]
# pattern       = "api.neobookworm.uk"
# custom_domain = true
# zone_name     = "neobookworm.uk"
#
# Production URL (current): https://neobookworm-landing-enquiry.nickbarrett.workers.dev

# ── Staging environment ───────────────────────────────────────────────────────
# Deploy with: npx wrangler deploy --env staging
# Worker URL:  https://neobookworm-landing-enquiry-staging.nickbarrett.workers.dev
[env.staging]
name            = "neobookworm-landing-enquiry-staging"
workers_dev     = true
preview_urls    = false

[[env.staging.d1_databases]]
binding      = "neobookworm_enquiries_staging"
database_name = "neobookworm-enquiries-staging"
# TODO: paste ID from `setup-staging` script output (d1 create neobookworm-enquiries-staging)
database_id  = "96b0a37a-c664-4143-9af1-c91e3f34333b"

# Staging crons run at a reduced cadence to avoid noise.
# Retry: once per hour instead of every 15 min.
# Digest: disabled (set to an unlikely time — 03:00 UTC on 1 Jan only).
[env.staging.triggers]
crons = ["0 * * * *", "0 3 1 1 *"]
